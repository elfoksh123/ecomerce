<section class="containerm px-5">
    <h2>popular gategorry</h2>
    <owl-carousel-o [options]="customOptions">

       
         @for (cat of Categories; track $index) {
            <ng-template carouselSlide>
                <div>
                    <img [src]="cat.image" class="w-full h-[250px]" alt="">
                    <h3 class="text-green-600">{{cat.name}}</h3>
                </div>
              </ng-template>
         }
        
      </owl-carousel-o>
</section>


<section class="container p-5">
    <h2 class="text-4xl">popularproduct</h2>
    <div class=" grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10">
        
       @for (prod of products.slice(0,12); track $index) {
        <div class="card border border-gray-400/50 rounded-md overflow-hidden shadow relative">
            <div class="card-img">
                <img [src]="prod.imageCover" class="w-full h-[250px] object-contain" [alt]="prod.title">
            </div>
            <div class="card-body px-2 py-4" >
                <h4 class="text-green-500 text-xs">{{prod.category}}</h4>
                <h3 class="font-medium">{{prod.title.split(" ",2).join(" ")}}</h3>
                <div class="flex justify-between items-center">
                    <span>{{prod.price}}EGp</span>
                    <div class="flex items-center">
                        <i class="fas fa-star text-yellow-300"></i>
                        <span class="text-gray-500">4.5</span>
                    </div>
                </div>
            </div>
    <button class="bg-green-600 text-white py-2 px-10 w-[90%] mx-auto block border rounded">add to card</button>
        </div>
       }
    </div>
    
</section>
